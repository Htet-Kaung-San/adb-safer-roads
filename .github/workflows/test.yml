name: Test Scoring Logic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install geopandas shapely pyproj fiona pandas numpy scipy scikit-learn pytest

      - name: Run scoring unit tests
        run: python -m pytest tests/test_scoring.py -v
